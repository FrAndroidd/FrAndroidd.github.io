<!DOCTYPE html>
<html>
    <head>
        <title>New Tab</title>
        <link rel="icon" href="assets/favicon.svg">
        <link rel="stylesheet" href="assets/styles.css">
        <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;700&family=Inter:wght@700;900&family=Roboto:wght@500;700;900&display=swap" rel="stylesheet">
    </head>

    <body>
        <div class="clock-container" id="clock-container">
            <span class="clock" id="clock">12:00</span>
            <div class="weather-icon"></div>
            <span class="weather" id="weather">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;0°C - Clear</span>
            </div>
        </div>

        <div class="button-container" id="button-container">
            <a class="button-common button-tl" href="https://github.com/FrAndroidd">
                <div class="button-in-common button-in-tl"></div>
            </a>
            <a class="button-common button-tm" href="https://open.spotify.com">
                <div class="button-in-common button-in-tm"></div>
            </a>
            <a class="button-common button-tr" href="https://www.figma.com/files/drafts">
                <div class="button-in-common button-in-tr"></div>
            </a>
            <a class="button-common button-bl" href="https://www.youtube.com/watch?v=qWNQUvIk954">
                <div class="button-in-common button-in-bl"></div>
            </a>
            <a class="button-common button-bm" href="https://discord.com/channels/@me">
                <div class="button-in-common button-in-bm"></div>
            </a>
            <a class="button-common button-br" href="https://mail.google.com/mail/u/0/">
                <div class="button-in-common button-in-br"></div>
            </a>
        </div>

        <div class="list-container" id="list-container">
            <div class="list-common todo">
                <div class="list-in-common todo-in">
                    <div class="list-icon-common"></div>
                    <textarea spellcheck="false" placeholder="Type something..." class="todo-textarea" id="todo-textarea"></textarea>
                </div>
            </div>

            <div class="list-common links">
                <div class="list-in-common">
                    <a class="link-common link1" href="https://vscode.dev/">VSCode</a>
                    <a class="link-common link2" href="https://slack.com/intl/es-ar">Slack</a>
                    <a class="link-common link3" href="https://about.gitlab.com/">GitLab</a>
                    <a class="link-common link4" href="https://trello.com/">Trello</a>
                    <a class="link-common link5" href="https://outlook.com/">Outlook</a>
                </div>
            </div>
        </div>

        <script src="assets/script.js"></script>
    </body>
</html>
